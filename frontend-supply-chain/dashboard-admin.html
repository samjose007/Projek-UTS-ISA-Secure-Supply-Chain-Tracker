<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Audit Logistik</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #39FF14; padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 10px; border-left: 4px solid #39FF14; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: #161b22; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #39FF14; color: #0d1117; }
        .btn { background: #39FF14; color: black; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #39FF14; padding-bottom: 15px; margin-bottom: 30px;">
        <h1 style="margin: 0; font-size: 24px;">Portal <span style="color: #39FF14;" id="roleTitle">...</span></h1>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right; line-height: 1.2;">
                <div id="displayUsername" style="font-weight: bold; font-size: 16px;">Loading...</div>
                <div id="displayEkspedisi" style="font-size: 12px; color: #8b949e;">Loading...</div>
            </div>
            
            <button onclick="bukaSettingModal()" style="background: transparent; border: none; color: #39FF14; cursor: pointer;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <div id="modalSetting" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.8); z-index: 999; justify-content: center; align-items: center;">
        <div style="background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #39FF14; width: 300px; text-align: center; position: relative;">
            <span onclick="tutupSettingModal()" style="position: absolute; right: 15px; top: 10px; font-size: 20px; cursor: pointer; color: #8b949e;">&times;</span>
            <h3>Pengaturan Akun</h3>
            <button onclick="bukaMenu2FA()" style="width: 100%; padding: 10px; margin-top: 15px; background: transparent; border: 1px solid #39FF14; color: #39FF14; border-radius: 5px; cursor: pointer;">🛡️ Aktifkan 2FA (TOTP)</button>
            <button onclick="prosesLogout()" style="width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 5px; cursor: pointer;">🚪 Keluar (Logout)</button>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Peringatan Integritas Data</h3>
            <h2 style="color: #39FF14;">0 Modifikasi Ilegal</h2>
        </div>
        <div class="card">
            <h3>Sistem Aktif</h3>
            <h2 style="color: #39FF14;">SHA-256 Hashing</h2>
        </div>
    </div>

    <h2 style="margin-top: 30px;">Log Pelacakan Rantai Pasok</h2>
    <table id="tabelPengiriman">
        <thead>
            <tr>
                <th>No Resi</th>
                <th>Supplier</th>
                <th>Status Terbaru</th>
                <th>Aksi Verifikasi & Laporan</th>
            </tr>
        </thead>
        <tbody id="bodyTabel">
            </tbody>
    </table>

    <script>
        async function verifikasiLog(idPengiriman) {
            const token = localStorage.getItem('token_akses');
            try {
                const response = await fetch(`http://127.0.0.1:8000/pelacakan/verifikasi/${idPengiriman}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                alert(`Status Integritas: ${data.integritas}\nPesan: ${data.pesan}`);
            } catch (err) {
                alert('Gagal menghubungi node verifikasi.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('user_role') || 'Unknown';
            const username = localStorage.getItem('username') || 'Pengguna';
            
            document.getElementById('roleTitle').innerText = role;
            document.getElementById('displayUsername').innerText = username;
            
            // Logika untuk Kurir/Admin yang punya jasa ekspedisi
            if(role === 'Kurir' || role === 'Admin') {
                // Di sistem aslinya, ambil dari API fetch("/me"). Untuk sementara jika belum ada di API:
                document.getElementById('displayEkspedisi').innerText = "Divisi Operasional";
            } else {
                document.getElementById('displayEkspedisi').innerText = "Mitra Bisnis";
            }
        });

        document.addEventListener('DOMContentLoaded', muatDataDariDatabase);

        async function muatDataDariDatabase() {
            const tbody = document.getElementById('bodyTabel');
            
            // CONTOH FETCH KE BACKEND (Endpoint harus dibuat di backend)
            // const token = localStorage.getItem('token_akses');
            // const response = await fetch('http://127.0.0.1:8000/pengiriman/all', { headers: {'Authorization': `Bearer ${token}`} });
            // const dataPengiriman = await response.json();
            
            // SIMULASI RESPONSE DATABASE AGAR UI BISA BERJALAN DULU
            const dataPengiriman = [
                { id_pengiriman: 1, no_resi: "TRX-A891", supplier: "PT Indo Jaya", status: "Paket Berhasil Dikirim" },
                { id_pengiriman: 2, no_resi: "TRX-B223", supplier: "CV Maju Terus", status: "Tiba di Hub Transit" }
            ];

            tbody.innerHTML = ''; // Kosongkan tabel dulu
            
            dataPengiriman.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: bold; color: white;">${item.no_resi}</td>
                    <td>${item.supplier}</td>
                    <td style="color: #39FF14;">${item.status}</td>
                    <td>
                        <button style="background: #161b22; border: 1px solid #39FF14; color: #39FF14; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px;" onclick="cekIntegritas(${item.id_pengiriman})">🔍 Cek Hash</button>
                        <button style="background: #39FF14; border:none; color: #000; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="cetakPDF('${item.no_resi}', '${item.supplier}', '${item.status}')">📄 PDF</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function cekIntegritas(id) {
            // Fungsi panggil endpoint /pelacakan/verifikasi/{id} yang sudah ada di routes/pelacakan.py
            alert("Memeriksa integritas SHA-256 untuk ID Pengiriman: " + id);
        }

        function cetakPDF(resi, supplier, status) {
            // Membuka window baru khusus format cetak, mengambil data spesifik baris tersebut
            const printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<html><head><title>Cetak Laporan - ' + resi + '</title>');
            printWindow.document.write('<style>body{font-family: sans-serif; padding: 20px;} th, td{text-align: left; padding: 10px; border-bottom: 1px solid #ddd;}</style></head><body>');
            printWindow.document.write('<h2>Sertifikat Integritas Rantai Pasok</h2>');
            printWindow.document.write('<p><strong>Sistem Pendeteksi:</strong> Algoritma SHA-256 (Blockchain-like)</p><hr>');
            printWindow.document.write('<table>');
            printWindow.document.write(`<tr><th>Nomor Resi</th><td>${resi}</td></tr>`);
            printWindow.document.write(`<tr><th>Pengirim / Supplier</th><td>${supplier}</td></tr>`);
            printWindow.document.write(`<tr><th>Status Akhir Terverifikasi</th><td>${status}</td></tr>`);
            printWindow.document.write(`<tr><th>Hasil Verifikasi Audit</th><td><strong>VALID</strong> (Tidak ada manipulasi data)</td></tr>`);
            printWindow.document.write('</table><br><br><p>Dicetak secara otomatis oleh sistem Secure Supply Chain Tracker.</p>');
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }

        function bukaSettingModal() { document.getElementById('modalSetting').style.display = 'flex'; }
        function tutupSettingModal() { document.getElementById('modalSetting').style.display = 'none'; }
        function prosesLogout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
